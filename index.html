<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Определение IP — ПВЗ Контроль</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #f0f2f5;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-text-color: #222222;
            --accent-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 350px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .icon-box {
            width: 70px;
            height: 70px;
            background: var(--accent-gradient);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            box-shadow: 0 5px 15px rgba(37, 117, 252, 0.4);
        }

        .icon-box svg {
            width: 35px;
            fill: white;
        }

        h2 {
            margin: 0 0 10px;
            font-size: 1.4rem;
        }

        p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 25px;
        }

        .ip-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px;
            background: #f8f9fa;
            border: 2px dashed #dee2e6;
            border-radius: 12px;
            margin-bottom: 25px;
            color: var(--tg-theme-button-color);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--accent-gradient);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon-box">
        <svg viewBox="0 0 24 24"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/></svg>
    </div>
    <h2>Проверка локации</h2>
    <p id="status-text">Определяем ваш рабочий IP-адрес...</p>
    
    <div id="ip-container" class="hidden">
        <div class="ip-display" id="user-ip">0.0.0.0</div>
        <button class="btn" onclick="sendToBot()">Подтвердить и войти</button>
    </div>

    <div id="loading">
        <div class="loader"></div>
        <span>Минутку...</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // Расширяем на весь экран

    let detectedIp = "";

    async function getIp() {
        try {
            // Используем публичный API для получения IP
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            
            detectedIp = data.ip;
            
            document.getElementById('user-ip').innerText = detectedIp;
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('ip-container').classList.remove('hidden');
            document.getElementById('status-text').innerText = "IP успешно определен!";
        } catch (error) {
            document.getElementById('status-text').innerText = "Ошибка получения IP. Проверьте сеть.";
            document.getElementById('loading').classList.add('hidden');
        }
    }

    function sendToBot() {
        if (detectedIp) {
            // Отправляем данные боту
            tg.sendData(detectedIp);
            // Закрываем Web App (опционально, бот может закрыть сам)
            tg.close();
        }
    }

    // Запускаем определение при загрузке
    window.onload = getIp;
</script>

</body>
</html>
