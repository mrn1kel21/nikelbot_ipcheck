<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Определение IP — ПВЗ Контроль</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
    --tg-theme-bg-color:#f0f2f5;
    --tg-theme-button-color:#2481cc;
    --accent-gradient:linear-gradient(135deg,#6a11cb 0%,#2575fc 100%);
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    background:var(--tg-theme-bg-color);
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card{
    background:white;
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:350px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.ip-display{
    font-family:monospace;
    font-size:1.2rem;
    font-weight:bold;
    padding:15px;
    background:#f8f9fa;
    border:2px dashed #dee2e6;
    border-radius:12px;
    margin-bottom:25px;
    color:var(--tg-theme-button-color);
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:var(--accent-gradient);
    color:white;
    font-weight:600;
    cursor:pointer;
}

.loader{
    border:3px solid #f3f3f3;
    border-top:3px solid #3498db;
    border-radius:50%;
    width:20px;
    height:20px;
    animation:spin 1s linear infinite;
    display:inline-block;
    margin-right:10px;
}

@keyframes spin{
    0%{transform:rotate(0deg)}
    100%{transform:rotate(360deg)}
}

.hidden{display:none}
</style>
</head>

<body>

<div class="card">

<h2>Проверка локации</h2>
<p id="status-text">Определяем ваш рабочий IP...</p>

<div id="ip-container" class="hidden">
<div class="ip-display" id="user-ip">0.0.0.0</div>
<button class="btn" id="send-btn">Отправить и закрыть</button>
</div>

<div id="loading">
<div class="loader"></div>
<span>Минутку...</span>
</div>

</div>

<script>

const tg = window.Telegram.WebApp
tg.ready()
tg.expand()

let detectedIp = ""

async function getIp(){

    try{

        const res = await fetch("https://api.ipify.org?format=json")
        const data = await res.json()

        detectedIp = data.ip

        document.getElementById("user-ip").innerText = detectedIp
        document.getElementById("loading").classList.add("hidden")
        document.getElementById("ip-container").classList.remove("hidden")
        document.getElementById("status-text").innerText = "IP успешно определён"

    }catch(e){

        document.getElementById("status-text").innerText = "Ошибка получения IP"

    }
}

function sendIp(){

    const payload = {
        ip: detectedIp
    }

    tg.sendData(JSON.stringify(payload))

    // важно дать Telegram время отправить данные
    setTimeout(() => {
        tg.close()
    }, 400)
}

document
    .getElementById("send-btn")
    .addEventListener("click", sendIp)

window.onload = getIp

</script>

</body>
</html>
