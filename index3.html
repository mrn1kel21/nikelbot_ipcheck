<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<script>
const tg = window.Telegram.WebApp;

async function getIP() {
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();

    const ip = data.ip;

    tg.sendData(ip);

    tg.close();
}

getIP();
</script>

</body>
</html>
